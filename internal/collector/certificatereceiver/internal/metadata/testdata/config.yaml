default:
all_set:
  metrics:
    nginx.certificate.time_to_expiration:
      enabled: true
  resource_attributes:
    instance.id:
      enabled: true
none_set:
  metrics:
    nginx.certificate.time_to_expiration:
      enabled: false
  resource_attributes:
    instance.id:
      enabled: false
filter_set_include:
  resource_attributes:
    instance.id:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    instance.id:
      enabled: true
      metrics_exclude:
        - strict: "instance.id-val"
